spring.application.name=algorithm-visualizer-backend
server.port=8080

# ===== Swagger / OpenAPI =====
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs

# ===== App config =====
# Guard rails for input size (a visualizer only needs small arrays).
visualizer.max-array-size=30
visualizer.min-array-size=2

# Allowed frontend origins for CORS (Vite dev server).
visualizer.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173

# ===== Logging =====
logging.level.com.harsh.visualizer=DEBUG
